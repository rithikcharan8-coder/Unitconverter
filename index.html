<!DOCTYPE html>
<html>
<head>
<title>Unit Converter</title>
<style>
body{
    font-family:Arial;
    text-align:center;
    background:#f2f2f2;
}
.container{
    width:90%;
    margin:auto;
    margin-top:50px;
    background:white;
    padding:20px;
    border-radius:10px;
}
input,select,button{
    width:90%;
    padding:10px;
    margin:10px;
}
</style>
</head>
<body>

<div class="container">
<h1>Unit Converter</h1>

<input type="number" id="value" placeholder="Enter Value">

<select id="conversion">
<option value="m-km">Meter to Kilometer</option>
<option value="km-m">Kilometer to Meter</option>
<option value="kg-g">Kilogram to Gram</option>
<option value="g-kg">Gram to Kilogram</option>
<option value="c-f">Celsius to Fahrenheit</option>
<option value="f-c">Fahrenheit to Celsius</option>
</select>

<button onclick="convert()">Convert</button>

<h2 id="result"></h2>
</div>

<script>
function convert(){
let value=parseFloat(document.getElementById("value").value);
let type=document.getElementById("conversion").value;
let result;

switch(type){
case "m-km":
result=value/1000;
break;

case "km-m":
result=value*1000;
break;

case "kg-g":
result=value*1000;
break;

case "g-kg":
result=value/1000;
break;

case "c-f":
result=(value*9/5)+32;
break;

case "f-c":
result=(value-32)*5/9;
break;
}

document.getElementById("result").innerHTML="Result: "+result;
}
</script>

</body>
</html>
